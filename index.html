<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>FishLog V1</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <section id="mapView" class="view active">
      <div id="map"></div>
      <header class="mapHeader">
        <button class="roundBtn" id="menuBtn">☰</button>
        <div class="titleBlock"><h1>FishLog</h1><button class="lakeBtn">Taylorsville Lake ▾</button></div>
        <button class="roundBtn" id="searchBtn">⌕</button>
      </header>
      <div class="mapControls">
        <button class="mapCtl funBtn satelliteBtn" id="locateBtn" title="Use GPS">🛰️</button>
        <button class="mapCtl funBtn bassBtn" id="homeBtn" title="Jump to hotspot">🐟</button>
      </div>
      <div class="weatherCard"><span>🌤️</span><b>74°F Cloudy</b><small>Tap map to set manual catch spot, or use GPS.</small></div>
      <button id="quickLog" class="fab">＋<span>LOG CATCH</span></button>
    </section>

    <section id="logView" class="view formView">
      <div class="pageTop"><button id="cancelLog">Cancel</button><h2>Log Catch</h2><button id="saveCatch">Save</button></div>
      <div class="formCard">
        <label>Species<select id="species"><option>Largemouth Bass</option><option>Smallmouth Bass</option><option>Spotted Bass</option><option>Crappie</option><option>Catfish</option><option>Other</option></select></label>
        <label>Length (in)<input id="length" type="number" step="0.1" value="18.5"></label>
        <label>Weight (lb)<input id="weight" type="number" step="0.01" value="3.2"></label>
        <label class="lureGroup">Lure Used
          <select id="lureType"></select>
          <select id="lureExact"></select>
          <select id="lureColor"></select>
          <button id="addCustomLure" type="button" class="fakeInput addCustomBtn">＋ Add lure not listed</button>
        </label>
        <label>Depth (ft)<input id="depth" type="number" step="0.5" value="8"></label>
        <label>Water Temp (°F)<input id="waterTemp" type="number" step="1" value="68"></label>
        <label>Location<input id="locationText" readonly><small class="fieldHint">Tap the map for manual pin location or use GPS.</small></label>
        <label class="photoField">Photo<div class="photoBox"><input id="fishPhoto" type="file" accept="image/*" capture="environment"><button type="button" id="clearPhoto" class="smallGhost hidden">Remove photo</button><img id="photoPreview" class="photoPreview hidden" alt="Fish photo preview"></div></label>
        <label>Notes<textarea id="notes" placeholder="Outside grass line near dock..."></textarea></label>
      </div>
    </section>

    <section id="historyView" class="view listView">
      <div class="pageTop"><button id="clearAllBtn">Reset</button><h2>Catch History</h2><button id="editHistoryBtn">Select</button></div>
      <div class="bulkBar hidden" id="bulkBar">
        <label class="checkAll"><input type="checkbox" id="selectAllCatches"> Select all</label>
        <button id="deleteSelectedBtn" class="danger">Delete selected</button>
      </div>
      <div id="historyList" class="historyList"></div>
    </section>

    <section id="statsView" class="view listView"><div class="pageTop"><span></span><h2>Stats</h2><span></span></div><div id="statsBox" class="panel"></div></section>
    <section id="luresView" class="view listView"><div class="pageTop"><span></span><h2>Lures</h2><button id="addLureBtn">Add</button></div><div id="lureList" class="historyList"></div></section>
  </div>

  <nav class="bottomNav">
    <button data-view="mapView" class="active">◩<span>Map</span></button>
    <button data-view="logView">🐟<span>Log</span></button>
    <button data-view="historyView">☷<span>History</span></button>
    <button data-view="statsView">▥<span>Stats</span></button>
    <button data-view="luresView">☘️<span>Lures</span></button>
  </nav>

  <div id="detailSheet" class="sheet hidden"><div class="sheetCard"><button id="closeSheet" class="close">×</button><div id="sheetContent"></div></div></div>
  <div id="photoModal" class="photoModal hidden"><button id="closePhotoModal" class="photoModalClose">×</button><img id="photoModalImg" alt="Expanded fish photo"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
  <script src="app.js"></script>
</body>
</html>
