<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>FishLog</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <section id="mapPage" class="page active">
      <div id="map"></div>

      <header class="topBar">
        <div>
          <div class="appTitle">FishLog</div>
          <div class="subTitle">Satellite catch map</div>
        </div>
        <button id="openLogBtn" class="primaryMini">+ Catch</button>
      </header>

      <div class="mapButtons">
        <button id="gpsBtn" class="roundBtn satelliteBtn" title="Use GPS"><span>🛰️</span></button>
        <button id="hotspotBtn" class="roundBtn bassBtn" title="Hotspot"><span>🐟</span></button>
      </div>

      <div id="tapHint" class="tapHint">Tap map to set manual catch location</div>
      <div id="toast" class="toast"></div>
    </section>

    <section id="logPage" class="page formPage">
      <header class="formHeader">
        <button id="cancelLogTop" class="ghostBtn">Cancel</button>
        <h1>Log Catch</h1>
        <button id="saveCatchTop" class="saveBtn">Save</button>
      </header>

      <main class="formBody">
        <div class="locationBox">
          <div class="label">Catch Location</div>
          <div id="locationText">No location selected</div>
          <div class="locationActions">
            <button id="useGpsFromForm" class="secondaryBtn">Use GPS</button>
            <button id="backToMapForPin" class="secondaryBtn">Pick on Map</button>
          </div>
        </div>

        <label>Species
          <select id="species">
            <option value="Largemouth Bass">Largemouth Bass</option>
            <option value="Smallmouth Bass">Smallmouth Bass</option>
            <option value="Spotted Bass">Spotted Bass</option>
            <option value="Crappie">Crappie</option>
            <option value="Bluegill">Bluegill</option>
            <option value="Catfish">Catfish</option>
            <option value="Other">Other</option>
          </select>
        </label>

        <div class="twoCol">
          <label>Length inches
            <input id="length" type="number" inputmode="decimal" placeholder="15" />
          </label>
          <label>Weight lbs
            <input id="weight" type="number" inputmode="decimal" placeholder="3.2" />
          </label>
        </div>

        <label>Lure Type
          <select id="lureType"></select>
        </label>
        <label>Exact Lure
          <select id="lureExact"></select>
        </label>
        <label>Color
          <select id="lureColor"></select>
        </label>
        <label id="customLureWrap" class="hidden">Custom Lure
          <input id="customLure" type="text" placeholder="Enter lure name" />
        </label>

        <label>Depth feet
          <input id="depth" type="number" inputmode="decimal" placeholder="8" />
        </label>

        <label>Notes
          <textarea id="notes" placeholder="Cover, bank type, weather, retrieve, etc."></textarea>
        </label>

        <div class="photoBox">
          <div class="label">Fish Photo</div>
          <input id="photoInput" type="file" accept="image/*" />
          <img id="photoPreview" class="photoPreview hidden" alt="Photo preview" />
        </div>
      </main>
    </section>

    <section id="historyPage" class="page listPage">
      <header class="formHeader">
        <button id="selectModeBtn" class="ghostBtn">Select</button>
        <h1>History</h1>
        <button id="deleteSelectedBtn" class="dangerBtn hidden">Delete</button>
      </header>
      <div class="selectTools hidden" id="selectTools">
        <button id="selectAllBtn" class="secondaryBtn">Select All</button>
        <button id="clearSelectedBtn" class="secondaryBtn">Clear</button>
      </div>
      <main id="historyList" class="historyList"></main>
    </section>

    <section id="statsPage" class="page listPage">
      <header class="formHeader"><div></div><h1>Stats</h1><div></div></header>
      <main id="statsBody" class="statsBody"></main>
    </section>

    <nav class="bottomNav">
      <button data-page="mapPage" class="navBtn active">Map</button>
      <button data-page="logPage" class="navBtn">Log</button>
      <button data-page="historyPage" class="navBtn">History</button>
      <button data-page="statsPage" class="navBtn">Stats</button>
    </nav>

    <div id="detailOverlay" class="detailOverlay hidden">
      <article class="fishCard">
        <button id="closeCard" class="closeBtn" aria-label="Close">×</button>
        <div class="cardHero" id="cardHero"></div>
        <div class="cardContent" id="cardContent"></div>
      </article>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="app.js"></script>
</body>
</html>
