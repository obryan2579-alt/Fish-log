<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>FishLog V1</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <section id="mapPage" class="page active">
      <div id="map"></div>
      <div class="topBar">
        <div><strong>FishLog</strong><span id="locationHint">Tap map or use GPS to set catch spot</span></div>
      </div>
      <button id="gpsBtn" class="mapBtn satellite" title="Use GPS">🛰️</button>
      <button id="hotBtn" class="mapBtn bassHot" title="Go to hotspot">🐟</button>
      <button id="logHereBtn" class="logHere hidden">Log catch here</button>
    </section>

    <section id="logPage" class="page formPage">
      <header class="pageHeader"><h1>Log Catch</h1><button id="cancelLogTop" class="ghostBtn">Cancel</button></header>
      <div class="formCard">
        <label>Species
          <select id="species"><option>Largemouth Bass</option><option>Smallmouth Bass</option><option>Spotted Bass</option><option>Crappie</option><option>Bluegill</option><option>Catfish</option><option>Other</option></select>
        </label>
        <div class="row2">
          <label>Length (in)<input id="length" type="number" step="0.25" placeholder="15.5" /></label>
          <label>Weight (lb)<input id="weight" type="number" step="0.1" placeholder="2.8" /></label>
        </div>
        <label>Lure type
          <select id="lureType"></select>
        </label>
        <label>Exact lure
          <select id="lureExact"></select>
        </label>
        <label>Color
          <select id="lureColor"></select>
        </label>
        <div id="customLureBox" class="customBox hidden">
          <input id="customLure" placeholder="Enter custom lure name" />
        </div>
        <label>Depth / cover<input id="depth" placeholder="6 ft, laydown, dock, grass edge" /></label>
        <label>Notes<textarea id="notes" rows="3" placeholder="Water color, wind, retrieve, etc."></textarea></label>
        <label class="photoBox">Fish photo
          <input id="photoInput" type="file" accept="image/*" />
          <img id="photoPreview" class="preview hidden" alt="photo preview" />
        </label>
        <div class="locBox"><span id="chosenLoc">No location selected yet</span><button id="useGpsInForm" class="ghostBtn">Use GPS</button></div>
        <div class="actions"><button id="saveCatch" class="primaryBtn">Save Catch</button><button id="cancelLog" class="secondaryBtn">Cancel</button></div>
      </div>
    </section>

    <section id="historyPage" class="page formPage">
      <header class="pageHeader"><h1>History</h1><button id="selectModeBtn" class="ghostBtn">Select</button></header>
      <div id="bulkBar" class="bulkBar hidden"><button id="selectAllBtn">Select all</button><button id="deleteSelectedBtn" class="dangerBtn">Delete selected</button><button id="doneSelectBtn">Done</button></div>
      <div id="historyList" class="list"></div>
    </section>

    <section id="statsPage" class="page formPage">
      <header class="pageHeader"><h1>Stats</h1></header>
      <div id="statsContent" class="statsCard"></div>
    </section>

    <nav class="bottomNav">
      <button data-page="mapPage" class="active">Map</button>
      <button id="openLog">Log</button>
      <button data-page="historyPage">History</button>
      <button data-page="statsPage">Stats</button>
    </nav>
  </div>

  <div id="detailOverlay" class="overlay hidden"><div id="fishCard" class="fishCard"><button id="closeCard" class="closeBtn">×</button><div id="fishCardContent"></div></div></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
  <script src="app.js"></script>
</body>
</html>
