<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
  <title>FishLog V1</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>
  <div id="app">
    <div id="map"></div>

    <header class="topbar">
      <div>
        <div class="brand">FishLog</div>
        <div class="sub">Tap map for manual catch location</div>
      </div>
    </header>

    <div class="mapButtons">
      <button id="gpsBtn" class="roundBtn satellite" title="Use GPS">🛰️</button>
      <button id="hotBtn" class="roundBtn bassHot" title="Hotspot">🐟</button>
    </div>

    <div id="toast" class="toast hidden"></div>

    <div id="detailOverlay" class="overlay hidden">
      <div class="sheet fishSheet">
        <button id="closeDetail" class="closeBtn" aria-label="Close">×</button>
        <div class="bassArt" aria-hidden="true">
          <svg viewBox="0 0 520 180" role="img">
            <defs>
              <linearGradient id="g" x1="0" x2="1">
                <stop offset="0" stop-color="#71c173"/>
                <stop offset=".55" stop-color="#2f8f54"/>
                <stop offset="1" stop-color="#0c5d45"/>
              </linearGradient>
            </defs>
            <path d="M67 91c54-65 178-74 289-22l88-35-22 58 27 55-92-31C241 171 122 151 67 91z" fill="url(#g)" stroke="#d6f6b2" stroke-width="7" stroke-linejoin="round"/>
            <path d="M136 67c65 21 137 27 215 3" fill="none" stroke="#173e2f" stroke-width="7" stroke-linecap="round" opacity=".65"/>
            <path d="M161 108c58 15 115 15 184 0" fill="none" stroke="#173e2f" stroke-width="5" stroke-linecap="round" opacity=".45"/>
            <path d="M205 133l27-35 25 47z" fill="#1d6846" opacity=".85"/>
            <path d="M310 124l34 35 9-49z" fill="#1d6846" opacity=".85"/>
            <circle cx="110" cy="77" r="10" fill="#111"/>
            <circle cx="113" cy="74" r="3" fill="white"/>
            <path d="M72 98c25 4 40 1 54-12-5 25-25 38-54 12z" fill="#f3fff0" opacity=".9"/>
            <path d="M82 116c29 11 59 10 88 1" stroke="#132f25" stroke-width="4" stroke-linecap="round" opacity=".45"/>
          </svg>
        </div>
        <h2 id="detailTitle">Largemouth Bass</h2>
        <div id="detailPhotoWrap" class="photoWrap hidden"><img id="detailPhoto" alt="Catch photo"/></div>
        <div id="detailBody" class="detailGrid"></div>
      </div>
    </div>

    <main id="panel" class="panel hidden"></main>

    <nav class="bottomNav">
      <button data-tab="map" class="active">Map</button>
      <button data-tab="log">Log Catch</button>
      <button data-tab="history">History</button>
      <button data-tab="stats">Stats</button>
    </nav>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="app.js"></script>
</body>
</html>
